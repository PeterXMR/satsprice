name: Android

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref. PRs and main pushes get fresh CI;
# stale ones (e.g. force-pushed PR commits) are killed to save runner minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build debug APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust toolchain (+ Android targets)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android,i686-linux-android

      - name: Cache Rust build (core workspace)
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: core

      - name: Install cargo-ndk (prebuilt)
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-ndk

      - name: Set up Gradle (caches ~/.gradle)
        uses: gradle/actions/setup-gradle@v3

      - name: Build Rust core for 4 Android ABIs
        working-directory: core/ffi
        run: |
          cargo ndk \
            -t arm64-v8a -t armeabi-v7a -t x86_64 -t x86 \
            -o ../../app/android/src/main/jniLibs \
            build --release

      - name: Assemble debug APK
        working-directory: app
        run: ./gradlew :composeApp:assembleDebug --no-daemon

      - name: Upload debug APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SatsPrice-debug-${{ github.sha }}
          path: app/composeApp/build/outputs/apk/debug/composeApp-debug.apk
          if-no-files-found: error
          retention-days: 14
